<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Attendance – AI Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#0f172a 100%);min-height:100vh;color:#fff;}

/* Topbar */
.topbar{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.topbar-brand{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:700;color:#38bdf8;}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.4);color:#fca5a5;padding:5px 14px;border-radius:50px;font-size:.85rem;font-weight:600;}
.live-dot{width:9px;height:9px;background:#ef4444;border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Grid */
.main-grid{display:grid;grid-template-columns:1fr 380px;gap:24px;padding:28px;max-width:1400px;margin:0 auto;}

/* Camera */
.camera-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;overflow:hidden;position:relative;}
.camera-box img{width:100%;display:block;}
.camera-overlay{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
.cam-pill{background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border-radius:50px;padding:6px 14px;font-size:.8rem;color:#e2e8f0;}

/* Right panel */
.right-panel{display:flex;flex-direction:column;gap:18px;}
.glass-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:20px;}
.glass-card h6{font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:14px;}

/* Countdown */
.countdown-ring{text-align:center;padding:8px 0 4px;}
.countdown-num{font-size:2.8rem;font-weight:800;color:#f1f5f9;line-height:1;}
.countdown-lbl{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-top:4px;}
.progress-bar-wrap{height:6px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden;margin-top:14px;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#6366f1,#38bdf8);border-radius:6px;transition:width 1s linear;}

/* Stats */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-box{background:rgba(255,255,255,.05);border-radius:12px;padding:14px;text-align:center;}
.stat-box .num{font-size:2rem;font-weight:700;line-height:1;}
.stat-box .lbl{font-size:.75rem;color:#94a3b8;margin-top:4px;}

/* Marked list */
.marked-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.marked-list::-webkit-scrollbar{width:4px;}
.marked-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}
.marked-item{display:flex;align-items:center;gap:10px;background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.25);border-radius:10px;padding:9px 12px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
.marked-item .avatar{width:30px;height:30px;background:rgba(22,163,74,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;}
.marked-item .mname{font-size:.86rem;font-weight:600;}
.marked-item .mtime{font-size:.73rem;color:#86efac;margin-top:1px;}
.empty-state{text-align:center;color:#475569;padding:24px 0;font-size:.88rem;}

/* Email result */
.email-result{display:none;}
.email-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.84rem;}
.email-item:last-child{border-bottom:none;}

/* Home btn */
.btn-home{width:100%;padding:12px;background:rgba(255,255,255,.08);color:#cbd5e1;border:1px solid rgba(255,255,255,.15);border-radius:14px;font-size:.9rem;font-weight:600;text-align:center;text-decoration:none;display:block;transition:background .2s;}
.btn-home:hover{background:rgba(255,255,255,.14);color:#fff;}

/* Toast */
#toast{position:fixed;bottom:28px;right:28px;background:#1e293b;border:1px solid rgba(255,255,255,.12);color:#e2e8f0;padding:14px 20px;border-radius:14px;font-size:.86rem;box-shadow:0 8px 30px rgba(0,0,0,.4);display:none;z-index:9999;max-width:320px;}

/* Done banner */
.done-banner{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);border-radius:14px;padding:14px 18px;text-align:center;color:#34d399;font-weight:600;font-size:.92rem;display:none;}

@media(max-width:900px){.main-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.main-grid{padding:14px;gap:14px;}}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-brand"><i class="fa-solid fa-brain"></i> AI Smart Attendance</div>
  <div class="d-flex align-items-center gap-3">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <span style="color:#94a3b8;font-size:.85rem;" id="liveClock"></span>
  </div>
</div>

<!-- Main -->
<div class="main-grid">

  <!-- Camera -->
  <div>
    <div class="camera-box">
      <img src="{{ url_for('live_video_feed') }}" id="cameraFeed" alt="Live Camera">
      <div class="camera-overlay">
        <div class="cam-pill"><i class="fa-solid fa-eye me-1"></i>Face Recognition Active</div>
        <div class="cam-pill" id="statusPill">Scanning…</div>
        <div class="cam-pill" id="statusMessage">Waiting for faces...</div>
      </div>
    </div>

    <!-- Email results (shown automatically after session ends) -->
    <div id="emailResult" class="email-result mt-4 glass-card">
      <h6><i class="fa-solid fa-envelope me-2"></i>Email Notifications Sent</h6>
      <div id="emailList"></div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">

    <!-- Countdown -->
    <div class="glass-card">
      <h6><i class="fa-solid fa-clock me-2"></i>Session Timer</h6>
      <div class="countdown-ring">
        <div class="countdown-num" id="countdownNum">--:--</div>
        <div class="countdown-lbl">Time Remaining</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar" style="width:100%;"></div>
      </div>
      <div id="doneBanner" class="done-banner mt-3">
        <i class="fa-solid fa-circle-check me-2"></i>Session complete — emails sent!
      </div>
    </div>

    <!-- Stats -->
    <div class="glass-card">
      <h6><i class="fa-solid fa-chart-simple me-2"></i>Today's Session</h6>
      <div class="stat-row">
        <div class="stat-box">
          <div class="num text-success" id="presentCount">0</div>
          <div class="lbl">Present</div>
        </div>
        <div class="stat-box">
          <div class="num text-danger" id="absentCount">0</div>
          <div class="lbl">Absent</div>
        </div>
      </div>
    </div>

    <!-- Marked list -->
    <div class="glass-card" style="flex:1;">
      <h6><i class="fa-solid fa-user-check me-2"></i>Marked Attendance</h6>
      <div class="marked-list" id="markedList">
        <div class="empty-state" id="emptyState">
          <i class="fa-solid fa-camera fa-2x mb-2 d-block opacity-25"></i>
          Waiting for faces…
        </div>
      </div>
    </div>

    <!-- Back home -->
    <a href="/" class="btn-home"><i class="fa-solid fa-house me-2"></i>Back to Home</a>

  </div>
</div>

<div id="toast"></div>

<script>
// ── Config: session duration in minutes ──────────────────────
const SESSION_MINUTES = {{ session_minutes }};
const TOTAL_SECONDS   = SESSION_MINUTES * 60;
let   remaining       = TOTAL_SECONDS;
let   sessionEnded    = false;

// ── Clock ─────────────────────────────────────────────────────
function tick() {
  document.getElementById("liveClock").textContent =
    new Date().toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
}
tick(); setInterval(tick, 1000);

// ── Countdown ─────────────────────────────────────────────────
function updateCountdown() {
  if (sessionEnded) return;
  const m = String(Math.floor(remaining / 60)).padStart(2, "0");
  const s = String(remaining % 60).padStart(2, "0");
  document.getElementById("countdownNum").textContent = m + ":" + s;
  const pct = (remaining / TOTAL_SECONDS) * 100;
  document.getElementById("progressBar").style.width = pct + "%";

  if (remaining <= 0) {
    endSession();
    return;
  }
  remaining--;
}
updateCountdown();
const countdownTimer = setInterval(updateCountdown, 1000);

// ── Poll attendance every 2s ──────────────────────────────────
let knownNames = new Set();

async function pollAttendance() {
  if (sessionEnded) return;
  try {
    const res  = await fetch("/attendance_updates");
    const data = await res.json();
    document.getElementById("presentCount").textContent = data.present;
    document.getElementById("absentCount").textContent  = data.absent;
    const list  = document.getElementById("markedList");
    const empty = document.getElementById("emptyState");

    if (data.camera_status) {
      let label = data.camera_status.state;
      if (data.camera_status.confidence !== null) {
        label += ` (${Math.round(data.camera_status.confidence * 100)}%)`;
      }
      document.getElementById("statusPill").textContent = label;
      document.getElementById("statusMessage").textContent = data.camera_status.message || "Waiting for faces...";
    }

    data.marked.forEach(item => {
      if (!knownNames.has(item.name)) {
        knownNames.add(item.name);
        if (empty) empty.remove();
        const div = document.createElement("div");
        div.className = "marked-item";
        div.innerHTML = `
          <div class="avatar"><i class="fa-solid fa-user-check" style="color:#4ade80;"></i></div>
          <div>
            <div class="mname">${item.name}</div>
            <div class="mtime"><i class="fa-solid fa-clock me-1"></i>${item.time}</div>
          </div>
          <span class="ms-auto" style="background:rgba(22,163,74,.25);color:#4ade80;padding:2px 10px;border-radius:6px;font-size:.7rem;font-weight:700;">Present</span>`;
        list.appendChild(div);
      }
    });
  } catch(e) {}
}
pollAttendance();
const pollTimer = setInterval(pollAttendance, 2000);

// ── Auto end session — no button needed ───────────────────────
async function endSession() {
  if (sessionEnded) return;
  sessionEnded = true;
  clearInterval(countdownTimer);
  clearInterval(pollTimer);

  // Stop camera feed
  document.getElementById("cameraFeed").src = "";
  document.getElementById("statusPill").textContent = "Session Ended";
  document.getElementById("countdownNum").textContent = "00:00";
  document.getElementById("progressBar").style.width = "0%";

  showToast("⏱ Session ended — sending emails…");

  try {
    const res  = await fetch("/stop_camera", { method: "POST" });
    const data = await res.json();

    // Show email result panel
    const panel     = document.getElementById("emailResult");
    const emailList = document.getElementById("emailList");
    panel.style.display = "block";

    if (data.emails && data.emails.length > 0) {
      data.emails.forEach(e => {
        const div  = document.createElement("div");
        div.className = "email-item";
        const icon  = e.type === "present"
          ? '<i class="fa-solid fa-circle-check" style="color:#4ade80;font-size:1.1rem;"></i>'
          : '<i class="fa-solid fa-circle-xmark" style="color:#f87171;font-size:1.1rem;"></i>';
        const label = e.type === "present" ? "Attendance confirmed ✅" : "Absence alert ⚠️";
        div.innerHTML = `${icon}<div><strong>${e.name}</strong><br>
          <span style="color:#94a3b8;font-size:.75rem;">${e.email} — ${label}</span></div>`;
        emailList.appendChild(div);
      });
    } else {
      emailList.innerHTML = '<p style="color:#64748b;font-size:.84rem;margin:0;">No emails sent — no student email addresses found.</p>';
    }

    document.getElementById("doneBanner").style.display = "block";
    showToast("✅ Emails sent to all students!");

  } catch(err) {
    showToast("❌ Error sending emails: " + err.message);
  }
}

// ── Toast ──────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 5000);
}
</script>
</body>
</html>
