<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Student – AI Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='dashboard.css') }}" rel="stylesheet">
<style>
.set-label{color:#94a3b8;font-size:.82rem;font-weight:600;margin-bottom:6px;display:block;}
.set-input,.set-select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#f1f5f9;padding:12px 16px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .25s,box-shadow .25s;}
.set-input:focus,.set-select:focus{border-color:rgba(245,158,11,.6);box-shadow:0 0 0 3px rgba(245,158,11,.12);}
.set-input::placeholder{color:#334155;}
.set-select option{background:#1e293b;}
.set-input[readonly]{color:#64748b;cursor:not-allowed;}
.btn-save{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-save:hover{opacity:.88;}
.btn-cancel{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#64748b;border-radius:12px;padding:12px 22px;font-size:.9rem;font-weight:600;text-decoration:none;transition:background .2s,color .2s;}
.btn-cancel:hover{background:rgba(255,255,255,.1);color:#f1f5f9;}
</style>
</head>
<body>
<div class="dash-layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fa-solid fa-brain"></i></div>
      <div><div class="brand-text">AI Attend</div><div class="brand-ver">v2.0 Admin</div></div>
    </div>
    <nav>
      <a href="/dashboard" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-gauge"></i></span>Dashboard</a>
      <a href="/register"  class="nav-link"><span class="nav-icon"><i class="fa-solid fa-user-plus"></i></span>Register Student</a>
      <a href="/students"  class="nav-link active"><span class="nav-icon"><i class="fa-solid fa-users"></i></span>View Students</a>
      <a href="/analytics" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span>Analytics</a>
      <a href="/settings"  class="nav-link"><span class="nav-icon"><i class="fa-solid fa-gear"></i></span>Settings</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/logout" class="nav-link nav-logout"><span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span>Logout</a>
    </div>
  </aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <div>
        <div class="topbar-title"><i class="fa-solid fa-pen-to-square me-2" style="color:#fbbf24;"></i>Edit Student</div>
        <div class="topbar-sub">Update student information</div>
      </div>
    </div>

    <div class="panel" style="max-width:560px;position:relative;z-index:1;">
      <div class="panel-header">Update Student Details</div>
      <div style="padding:28px;">
        <form method="POST">
          <div style="margin-bottom:18px;">
            <label class="set-label">Full Name</label>
            <input type="text" name="student_name" class="set-input" value="{{ student[1] }}" required>
          </div>
          <div style="margin-bottom:18px;">
            <label class="set-label">Student ID <span style="color:#334155;font-weight:400;">(read-only)</span></label>
            <input type="text" class="set-input" value="{{ student[2] }}" readonly>
          </div>
          <div style="margin-bottom:18px;">
            <label class="set-label">Email Address</label>
            <input type="email" name="email" class="set-input" value="{{ student[6] if student[6] else '' }}" placeholder="student@example.com">
          </div>
          <div style="margin-bottom:18px;">
            <label class="set-label">Department</label>
            <input type="text" name="department" class="set-input" value="{{ student[4] }}" required>
          </div>
          <div style="margin-bottom:26px;">
            <label class="set-label">Year</label>
            <select name="year" class="set-select" required>
              {% for yr in ['1st Year','2nd Year','3rd Year','4th Year'] %}
              <option {% if student[5]==yr %}selected{% endif %}>{{ yr }}</option>
              {% endfor %}
            </select>
          </div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <button type="submit" class="btn-save"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
            <a href="/students" class="btn-cancel"><i class="fa-solid fa-xmark"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
